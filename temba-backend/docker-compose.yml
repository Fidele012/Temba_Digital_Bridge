version: "3.9"

services:
  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: temba
      POSTGRES_PASSWORD: temba_pass
      POSTGRES_DB: temba_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temba -d temba_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass temba_redis_pass --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "temba_redis_pass", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO (S3-compatible file storage) ────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  # ── Temba API ──────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://temba:temba_pass@db:5432/temba_db
      DATABASE_URL_SYNC: postgresql://temba:temba_pass@db:5432/temba_db
      REDIS_URL: redis://:temba_redis_pass@redis:6379/0
      CELERY_BROKER_URL: redis://:temba_redis_pass@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:temba_redis_pass@redis:6379/2
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Celery worker ─────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://temba:temba_pass@db:5432/temba_db
      DATABASE_URL_SYNC: postgresql://temba:temba_pass@db:5432/temba_db
      REDIS_URL: redis://:temba_redis_pass@redis:6379/0
      CELERY_BROKER_URL: redis://:temba_redis_pass@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:temba_redis_pass@redis:6379/2
    command: celery -A app.worker worker --loglevel=info --concurrency=4
    depends_on:
      - redis
      - db

  # ── Celery Flower (monitoring) ────────────────────────────────────────────
  flower:
    image: mher/flower:latest
    restart: unless-stopped
    environment:
      CELERY_BROKER_URL: redis://:temba_redis_pass@redis:6379/1
    ports:
      - "5555:5555"
    depends_on:
      - redis

volumes:
  postgres_data:
  redis_data:
  minio_data:
